<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard G-MES Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { text-align: center; color: #1a73e8; margin-bottom: 15px; }
        #status { text-align: center; font-size: 11px; font-weight: bold; margin-bottom: 10px; color: #666; }
        .filter-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; background: #f8f9fa; padding: 10px; border-radius: 8px; }
        .input-box { display: flex; flex-direction: column; font-size: 12px; }
        label { font-weight: bold; margin-bottom: 4px; color: #444; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: #1a73e8; color: white; padding: 15px; border-radius: 8px; text-align: center; }
        .card h3 { margin: 0; font-size: 12px; opacity: 0.9; text-transform: uppercase; }
        .card p { margin: 5px 0 0; font-size: 22px; font-weight: bold; }
        .chart-container { height: 320px; position: relative; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0">Produtividade G-MES</h2>
        <div id="status">⌛ Conectando à base de dados...</div>
    </div>

    <div class="filter-group">
        <div class="input-box">
            <label>Início</label>
            <input type="date" id="dataInicio" onchange="aplicarFiltros()">
        </div>
        <div class="input-box">
            <label>Fim</label>
            <input type="date" id="dataFim" onchange="aplicarFiltros()">
        </div>
        <div class="input-box" style="grid-column: span 2;">
            <label>Filtrar Localização (Ex: Linha29promo)</label>
            <input type="text" id="buscaLoc" placeholder="Digite a linha ou local..." oninput="aplicarFiltros()">
        </div>
    </div>

    <div class="stats">
        <div class="card">
            <h3>Produção Total (Kg)</h3>
            <p id="totalKg">0,00</p>
        </div>
        <div class="card" style="background: #34a853;">
            <h3>Qtd. Registros</h3>
            <p id="totalReg">0</p>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="graficoDiario"></canvas>
    </div>
</div>

<script>
const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRsMbWT3aqZ8t7jtk9uDa6Jtn8QpIUeS8sxcdMIYjvCNbgMjTDxDGWWQzzqSYENvbRcGq5UB7u4scwr/pub?gid=318060988&single=true&output=csv";

    let dadosOriginais = [];
    let meuGrafico = null;

    window.onload = () => {
        fetch(URL_CSV)
            .then(res => res.text())
            .then(csv => {
                // Divide por linhas e remove linhas totalmente vazias (comum no final do CSV)
                const linhas = csv.split(/\r?\n/).filter(l => l.trim() !== "" && l.includes(';'));
                
                // Identifica os cabeçalhos (usando ponto e vírgula conforme sua base)
                const headers = linhas[0].split(';').map(h => h.replace(/"/g, '').trim());

                // Localiza as colunas dinamicamente para evitar erros se a ordem mudar
                const iDia = headers.indexOf("Dia");
                const iLoc = headers.indexOf("SrcWarehouseLocation");
                const iQty = headers.indexOf("NewQuantity");

                dadosOriginais = linhas.slice(1).map(linha => {
                    const col = linha.split(';').map(c => c.replace(/"/g, '').trim());
                    
                    // Pula linhas que não tenham dados suficientes
                    if(!col[iDia] || !col[iQty]) return null;

                    // 1. CORREÇÃO DE NÚMERO: transforma "6,7" em 6.7
                    const peso = parseFloat(col[iQty].replace(',', '.')) || 0;
                    
                    // 2. CORREÇÃO DE DATA (Inversão dia/mês):
                    // Esperado: DD/MM/AAAA
                    const dataTexto = col[iDia]; 
                    let dataISO = "";

                    if(dataTexto.includes('/')) {
                        const partes = dataTexto.split('/');
                        const dia = partes[0].padStart(2, '0');
                        const mes = partes[1].padStart(2, '0');
                        const ano = partes[2].length === 2 ? "20" + partes[2] : partes[2];
                        
                        // Força o padrão internacional YYYY-MM-DD para o filtro funcionar
                        dataISO = `${ano}-${mes}-${dia}`;
                    } else {
                        dataISO = dataTexto; // Caso já venha em formato ISO
                    }

                    return {
                        dataISO: dataISO,
                        dataObj: new Date(dataISO + "T00:00:00"),
                        local: col[iLoc] || "Sem Local",
                        peso: peso
                    };
                }).filter(d => d && !isNaN(d.dataObj.getTime()));

                document.getElementById('status').innerHTML = "✅ Base Carregada: " + new Date().toLocaleTimeString();
                aplicarFiltros();
            })
            .catch(err => {
                document.getElementById('status').innerHTML = "❌ Erro ao conectar com a base do Google";
                console.error(err);
            });
    };

    function aplicarFiltros() {
        const d1 = document.getElementById('dataInicio').value; // Recebe YYYY-MM-DD do input
        const d2 = document.getElementById('dataFim').value;
        const busca = document.getElementById('buscaLoc').value.toLowerCase().trim();

        // Filtra os dados
        const filtrados = dadosOriginais.filter(d => {
            const matchData = (!d1 || d.dataISO >= d1) && (!d2 || d.dataISO <= d2);
            const matchLoc = !busca || d.local.toLowerCase().includes(busca);
            return matchData && matchLoc;
        });

        // Atualiza os Cards de resumo
        const totalKg = filtrados.reduce((acc, cur) => acc + cur.peso, 0);
        document.getElementById('totalKg').innerText = totalKg.toLocaleString('pt-BR', {minimumFractionDigits:2});
        document.getElementById('totalReg').innerText = filtrados.length;

        // Agrupa por dia para o gráfico
        const agrupado = {};
        filtrados.forEach(d => {
            agrupado[d.dataISO] = (agrupado[d.dataISO] || 0) + d.peso;
        });

        const labels = Object.keys(agrupado).sort();
        const valores = labels.map(l => agrupado[l]);

        // Reconstrói o gráfico
        if(meuGrafico) meuGrafico.destroy();
        
        const ctx = document.getElementById('graficoDiario').getContext('2d');
        meuGrafico = new Chart(ctx, {
            type: 'bar',
            data: {
                // Exibe no gráfico como DD/MM (mais amigável para o usuário)
                labels: labels.map(l => l.split('-').reverse().slice(0,2).join('/')),
                datasets: [{ 
                    label: 'Produção Diária (Kg)', 
                    data: valores, 
                    backgroundColor: '#1a73e8',
                    borderRadius: 5
                }]
            },
            options: { 
                maintainAspectRatio: false,
                scales: { 
                    y: { 
                        beginAtZero: true,
                        ticks: { callback: (value) => value + ' kg' }
                    } 
                }
            }
        });
    }
</script>
</body>
</html>
