<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard G-MES Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { text-align: center; color: #1a73e8; margin-bottom: 15px; }
        #status { text-align: center; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .filter-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; background: #f8f9fa; padding: 10px; border-radius: 8px; }
        .input-box { display: flex; flex-direction: column; font-size: 12px; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: #1a73e8; color: white; padding: 15px; border-radius: 8px; text-align: center; }
        .card h3 { margin: 0; font-size: 12px; opacity: 0.9; }
        .card p { margin: 5px 0 0; font-size: 20px; font-weight: bold; }
        .chart-container { height: 300px; position: relative; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0">Produtividade G-MES</h2>
        <div id="status">⌛ Conectando à nuvem...</div>
    </div>

    <div class="filter-group">
        <div class="input-box">
            <label>Início</label>
            <input type="date" id="dataInicio" onchange="aplicarFiltros()">
        </div>
        <div class="input-box">
            <label>Fim</label>
            <input type="date" id="dataFim" onchange="aplicarFiltros()">
        </div>
        <div class="input-box" style="grid-column: span 2;">
            <label>Localização (Busca rápida)</label>
            <input type="text" id="buscaLoc" placeholder="Ex: Linha29" oninput="aplicarFiltros()">
        </div>
    </div>

    <div class="stats">
        <div class="card">
            <h3>TOTAL KG</h3>
            <p id="totalKg">0,00</p>
        </div>
        <div class="card" style="background: #34a853;">
            <h3>REGISTROS</h3>
            <p id="totalReg">0</p>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="graficoDiario"></canvas>
    </div>
</div>

<script>
    // SEU LINK VALIDADO
    const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRsMbWT3aqZ8t7jtk9uDa6Jtn8QpIUeS8sxcdMIYjvCNbgMjTDxDGWWQzzqSYENvbRcGq5UB7u4scwr/pub?gid=318060988&single=true&output=csv";

    let dadosOriginais = [];
    let meuGrafico = null;

    window.onload = () => {
        fetch(URL_CSV)
            .then(res => res.text())
            .then(csv => {
                const linhas = csv.split(/\r?\n/).filter(l => l.trim() !== "");
                // O Google Sheets costuma usar vírgula como padrão na web
                const sep = csv.includes(';') ? ';' : ',';
                const headers = linhas[0].split(sep).map(h => h.replace(/"/g, '').trim());

                const iDia = headers.indexOf("Dia");
                const iLoc = headers.indexOf("SrcWarehouseLocation");
                const iQty = headers.indexOf("NewQuantity");

                dadosOriginais = linhas.slice(1).map(linha => {
                    const col = linha.split(sep).map(c => c.replace(/"/g, '').trim());
                    if(col.length < iQty) return null;

                    // Converte "6,7" ou "6.7" para número
                    const peso = parseFloat(col[iQty].replace(',', '.')) || 0;
                    
                    // Trata data DD/MM/AAAA ou AAAA-MM-DD
                    let dataISO = col[iDia];
                    if(dataISO.includes('/')) {
                        const p = dataISO.split('/');
                        dataISO = `${p[2]}-${p[1]}-${p[0]}`;
                    }

                    return {
                        dataISO: dataISO,
                        dataObj: new Date(dataISO + "T00:00:00"),
                        local: col[iLoc],
                        peso: peso
                    };
                }).filter(d => d && !isNaN(d.dataObj.getTime()));

                document.getElementById('status').innerHTML = "✅ Atualizado: " + new Date().toLocaleTimeString();
                aplicarFiltros();
            })
            .catch(err => {
                document.getElementById('status').innerHTML = "❌ Erro ao carregar dados";
                console.error(err);
            });
    };

    function aplicarFiltros() {
        const d1 = document.getElementById('dataInicio').value;
        const d2 = document.getElementById('dataFim').value;
        const busca = document.getElementById('buscaLoc').value.toLowerCase();

        const filtrados = dadosOriginais.filter(d => {
            const matchData = (!d1 || d.dataISO >= d1) && (!d2 || d.dataISO <= d2);
            const matchLoc = !busca || d.local.toLowerCase().includes(busca);
            return matchData && matchLoc;
        });

        // Atualiza números
        const total = filtrados.reduce((acc, cur) => acc + cur.peso, 0);
        document.getElementById('totalKg').innerText = total.toLocaleString('pt-BR', {minimumFractionDigits:2});
        document.getElementById('totalReg').innerText = filtrados.length;

        // Atualiza Gráfico
        const agrupado = {};
        filtrados.forEach(d => {
            agrupado[d.dataISO] = (agrupado[d.dataISO] || 0) + d.peso;
        });

        const labels = Object.keys(agrupado).sort();
        const valores = labels.map(l => agrupado[l]);

        if(meuGrafico) meuGrafico.destroy();
        meuGrafico = new Chart(document.getElementById('graficoDiario'), {
            type: 'bar',
            data: {
                labels: labels.map(l => l.split('-').reverse().slice(0,2).join('/')),
                datasets: [{ label: 'Kg por Dia', data: valores, backgroundColor: '#4285f4' }]
            },
            options: { maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
